<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PLUO">
<title>PLUO · Monitoreo de suelo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --paper:#F6F2EA;
    --ink:#20281F;
    --ink-soft:#5B6258;
    --moss:#2F5233;
    --moss-soft:#4C7A52;
    --clay:#B5572E;
    --seco:#C0432D;
    --ok:#2F7D45;
    --exceso:#2E6F95;
    --card:#FFFFFF;
    --line:#E6DECB;
    --shadow: 0 1px 2px rgba(32,40,31,0.04), 0 6px 16px rgba(32,40,31,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(28px + env(safe-area-inset-bottom));
  }
  .app{max-width:480px;margin:0 auto;padding:0 16px;}

  .hero{
    padding:calc(22px + env(safe-area-inset-top)) 4px 18px;
  }
  .word{
    font-family:"Space Grotesk",sans-serif;
    font-weight:700;
    font-size:30px;
    letter-spacing:0.5px;
    color:var(--moss);
  }
  .sub{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .updated{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:10px;
  }
  .updated.err{color:var(--seco);}

  .card{
    background:var(--card);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:18px 16px;
    margin-bottom:14px;
  }
  .card-title{
    font-family:"Space Grotesk",sans-serif;
    font-weight:700;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--moss);
    margin-bottom:12px;
  }

  /* ---- Sondas ---- */
  .sonda-row{
    display:flex;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .sonda-row:last-of-type{border-bottom:none;}
  .led{
    width:11px;height:11px;border-radius:50%;
    margin-right:12px;flex-shrink:0;
  }
  .led-ok{background:var(--ok);box-shadow:0 0 0 4px rgba(47,125,69,0.16);}
  .led-seco{background:var(--seco);box-shadow:0 0 0 4px rgba(192,67,45,0.16);}
  .led-exceso{background:var(--exceso);box-shadow:0 0 0 4px rgba(46,111,149,0.16);}
  .sonda-label{font-size:12.5px;color:var(--ink-soft);width:58px;flex-shrink:0;}
  .sonda-main{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-weight:600;font-size:20px;color:var(--ink);
    width:64px;flex-shrink:0;
  }
  .sonda-extra{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:12px;color:var(--ink-soft);
    margin-left:auto;text-align:right;
  }

  /* ---- filas ambiente / batería ---- */
  .meta-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;
    margin-top:4px;
  }
  .meta-box{
    background:var(--paper);border-radius:12px;padding:10px 12px;
  }
  .meta-label{font-size:11px;color:var(--ink-soft);margin-bottom:3px;}
  .meta-val{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-weight:600;font-size:16px;color:var(--ink);
  }
  .signal-bars{display:inline-flex;align-items:flex-end;gap:2px;margin-left:8px;height:11px;}
  .signal-bars span{width:3px;background:var(--line);border-radius:1px;}
  .signal-bars span.on{background:var(--moss);}

  /* ---- CP ---- */
  .cp-block{margin-top:14px;}
  .cp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .cp-variedad{font-size:12.5px;color:var(--ink-soft);}
  .cp-num{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-weight:600;font-size:14px;color:var(--moss);
  }
  .cp-track{height:8px;border-radius:6px;background:var(--line);overflow:hidden;}
  .cp-fill{height:100%;background:var(--moss);border-radius:6px;transition:width .4s ease;}

  /* ---- Chips de rango ---- */
  .chips{
    display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;
    -ms-overflow-style:none;scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:13px;font-weight:600;
    color:var(--moss);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:20px;
    padding:7px 14px;
    white-space:nowrap;
  }
  .chip.active{background:var(--moss);color:#fff;border-color:var(--moss);}

  .chart-wrap{position:relative;height:220px;}
  .chart-empty{
    text-align:center;color:var(--ink-soft);font-size:13px;padding:60px 0;
  }
  .legend-row{display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--ink-soft);}
  .legend-row span{display:inline-flex;align-items:center;gap:5px;}
  .legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

  .refresh-btn{
    display:block;width:100%;
    font-family:"Space Grotesk",sans-serif;
    font-weight:700;font-size:14px;letter-spacing:0.03em;
    color:#fff;background:var(--moss);
    border:none;border-radius:14px;
    padding:14px;margin-top:4px;
  }
  .refresh-btn:active{background:var(--moss-soft);}

  .skeleton{color:var(--ink-soft);font-size:13px;padding:8px 0;}
</style>
</head>
<body>
<div class="app">

  <div class="hero">
    <div class="word">PLUO</div>
    <div class="sub">Campo Colchagua · O'Higgins</div>
    <div class="updated" id="updated">Cargando estado…</div>
  </div>

  <section class="card" id="estadoCard">
    <div class="card-title">Estado actual</div>
    <div class="skeleton">Cargando…</div>
  </section>

  <section class="card">
    <div class="card-title">Humedad del suelo</div>
    <div class="chips" id="chips">
      <button class="chip" data-rango="hoy">Hoy</button>
      <button class="chip active" data-rango="7">7 días</button>
      <button class="chip" data-rango="15">15 días</button>
      <button class="chip" data-rango="60">60 días</button>
      <button class="chip" data-rango="90">90 días</button>
      <button class="chip" data-rango="total">Total</button>
    </div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
    <div class="chart-empty" id="chartEmpty" hidden>Sin datos en este rango</div>
    <div class="legend-row">
      <span><span class="legend-dot" style="background:#2F5233"></span>Sonda 1</span>
      <span><span class="legend-dot" style="background:#2E6F95"></span>Sonda 2</span>
    </div>
  </section>

  <section class="card">
    <div class="card-title">Temperatura ambiente</div>
    <div class="chips" id="chipsTemp">
      <button class="chip" data-rango="hoy">Hoy</button>
      <button class="chip active" data-rango="7">7 días</button>
      <button class="chip" data-rango="15">15 días</button>
      <button class="chip" data-rango="60">60 días</button>
      <button class="chip" data-rango="90">90 días</button>
      <button class="chip" data-rango="total">Total</button>
    </div>
    <div class="chart-wrap">
      <canvas id="chartTemp"></canvas>
    </div>
    <div class="chart-empty" id="chartEmptyTemp" hidden>Sin datos en este rango</div>
    <div class="legend-row">
      <span><span class="legend-dot" style="background:#2F5233"></span>Sonda 1</span>
      <span><span class="legend-dot" style="background:#2E6F95"></span>Ambiente</span>
    </div>
  </section>

  <button class="refresh-btn" id="refreshBtn">Actualizar</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwGpv0DB51SB_eYwD15EEVYuBzNHm834-apcd6bLF8UmBtWrxFAq9xYFKFwtKHWBz8/exec";
let rangoActual = "7";
let rangoTempActual = "7";
let chart = null;
let chartTemp = null;
let bandaSecoMax = 10;
let bandaExcesoMin = 46;

// Plugin Chart.js para dibujar bandas de color de fondo
const pluginBandas = {
  id: 'bandas',
  beforeDraw(chart) {
    const {ctx, chartArea:{top,bottom,left,right}, scales:{y}} = chart;
    const regiones = [
      {min:0,             max:bandaSecoMax,   color:'rgba(192,67,45,0.10)'},
      {min:bandaSecoMax,  max:bandaExcesoMin, color:'rgba(47,125,69,0.10)'},
      {min:bandaExcesoMin,max:60,             color:'rgba(46,111,149,0.10)'}
    ];
    ctx.save();
    // Bandas de color
    regiones.forEach(r => {
      const yTop    = y.getPixelForValue(r.max);
      const yBottom = y.getPixelForValue(r.min);
      ctx.fillStyle = r.color;
      ctx.fillRect(left, Math.max(top, yTop), right-left, Math.min(bottom, yBottom) - Math.max(top, yTop));
    });
    // Líneas segmentadas en los límites
    const limites = [
      {val: bandaSecoMax,   color:'rgba(192,67,45,0.6)'},
      {val: bandaExcesoMin, color:'rgba(46,111,149,0.6)'}
    ];
    limites.forEach(l => {
      const yPx = y.getPixelForValue(l.val);
      if (yPx < top || yPx > bottom) return;
      ctx.beginPath();
      ctx.setLineDash([6, 4]);
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = l.color;
      ctx.moveTo(left, yPx);
      ctx.lineTo(right, yPx);
      ctx.stroke();
    });
    ctx.setLineDash([]);
    ctx.restore();
  }
};

function bandClass(val, secoMax, excesoMin){
  if (val <= secoMax) return "led-seco";
  if (val >= excesoMin) return "led-exceso";
  return "led-ok";
}

function signalBars(rssi){
  let n = 1;
  if (rssi === null || rssi === undefined) n = 0;
  else if (rssi > -70) n = 4;
  else if (rssi > -85) n = 3;
  else if (rssi > -100) n = 2;
  else n = 1;
  let html = "";
  for (let i=1;i<=4;i++){
    let h = 3 + i*2;
    html += `<span class="${i<=n?'on':''}" style="height:${h}px"></span>`;
  }
  return html;
}

function battColor(v){
  if (v < 3.10) return "var(--seco)";
  if (v < 3.5) return "#B5572E";
  return "var(--moss)";
}

async function cargarEstado(){
  const card = document.getElementById('estadoCard');
  const updated = document.getElementById('updated');
  try{
    const r = await fetch(`${API}?app=estado`);
    const d = await r.json();
    if (d.error){
      card.innerHTML = `<div class="card-title">Estado actual</div><div class="skeleton">${d.error === 'sin datos' ? 'Aún no hay lecturas registradas.' : 'Error: '+d.error}</div>`;
      return;
    }
    const led1 = bandClass(parseFloat(d.hum1)||0, d.bandaSecoMax, d.bandaExcesoMin);
    const led2 = bandClass(parseFloat(d.hum2)||0, d.bandaSecoMax, d.bandaExcesoMin);
    const pct = Math.min(100, parseInt(d.pct)||0);
    bandaSecoMax   = parseFloat(d.bandaSecoMax)   || 10;
    bandaExcesoMin = parseFloat(d.bandaExcesoMin) || 46;

    card.innerHTML = `
      <div class="card-title">Estado actual</div>
      <div class="sonda-row">
        <span class="led ${led1}"></span>
        <span class="sonda-label">Sonda 1</span>
        <span class="sonda-main">${d.hum1}%</span>
        <span class="sonda-extra">${d.tmp1}°C · ${d.ec1} µS</span>
      </div>
      <div class="sonda-row">
        <span class="led ${led2}"></span>
        <span class="sonda-label">Sonda 2</span>
        <span class="sonda-main">${d.hum2}%</span>
        <span class="sonda-extra">${d.tmp2}°C · ${d.ec2} µS</span>
      </div>
      <div class="meta-grid">
        <div class="meta-box">
          <div class="meta-label">Ambiente</div>
          <div class="meta-val">${d.tamb}°C</div>
        </div>
        <div class="meta-box">
          <div class="meta-label">Presión</div>
          <div class="meta-val">${d.pres} hPa</div>
        </div>
        <div class="meta-box">
          <div class="meta-label">Batería</div>
          <div class="meta-val" style="color:${battColor(parseFloat(d.volt)||0)}">${d.volt} V</div>
        </div>
        <div class="meta-box">
          <div class="meta-label">Señal RTU1</div>
          <div class="meta-val">${d.rssi !== null ? d.rssi+' dBm' : '—'}<span class="signal-bars">${signalBars(d.rssi)}</span></div>
        </div>
        <div class="meta-box">
          <div class="meta-label">Intervalo lectura</div>
          <div class="meta-val">${d.periodoLec ? (d.periodoLec >= 60 ? Math.round(d.periodoLec/60)+' min' : d.periodoLec+' seg') : '—'}</div>
        </div>
      </div>
      <div class="cp-block">
        <div class="cp-top">
          <span class="cp-variedad">${d.variedad}</span>
          <span class="cp-num">${parseFloat(d.cpAcum).toFixed(1)} / ${d.cpMax} CP · ${pct}%</span>
        </div>
        <div class="cp-track"><div class="cp-fill" style="width:${pct}%"></div></div>
      </div>
    `;
    updated.textContent = "Última lectura: " + d.ts;
    updated.classList.remove('err');
  }catch(err){
    updated.textContent = "No se pudo conectar. Revisa tu conexión.";
    updated.classList.add('err');
  }
}

async function cargarGrafico(rango){
  rangoActual = rango;
  document.querySelectorAll('#chips .chip').forEach(c=>{
    c.classList.toggle('active', c.dataset.rango === rango);
  });
  const empty = document.getElementById('chartEmpty');
  const canvas = document.getElementById('chart');
  try{
    const r = await fetch(`${API}?app=grafico&param=humedad&rango=${rango}`);
    const d = await r.json();
    if (!d.labels || d.labels.length === 0){
      canvas.style.display='none';
      empty.hidden = false;
      return;
    }
    canvas.style.display='block';
    empty.hidden = true;

    if (chart) chart.destroy();
    chart = new Chart(canvas.getContext('2d'), {
      type:'line',
      plugins:[pluginBandas],
      data:{
        labels:d.labels,
        datasets:[
          {label:'Sonda 1', data:d.serie1, borderColor:'#2F5233', backgroundColor:'rgba(47,82,51,0.08)', fill:true, tension:0.35, pointRadius:0, borderWidth:2.5},
          {label:'Sonda 2', data:d.serie2, borderColor:'#2E6F95', fill:false, tension:0.35, pointRadius:0, borderWidth:2.5}
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          y:{min:0, max:60, ticks:{font:{size:10},color:'#5B6258'}, grid:{color:'rgba(32,40,31,0.05)'}},
          x:{ticks:{maxTicksLimit:6, font:{size:9}, color:'#5B6258'}, grid:{display:false}}
        }
      }
    });
  }catch(err){
    canvas.style.display='none';
    empty.hidden = false;
    empty.textContent = "No se pudo cargar el gráfico.";
  }
}

async function cargarGraficoTemp(rango){
  rangoTempActual = rango;
  document.querySelectorAll('#chipsTemp .chip').forEach(c=>{
    c.classList.toggle('active', c.dataset.rango === rango);
  });
  const empty = document.getElementById('chartEmptyTemp');
  const canvas = document.getElementById('chartTemp');
  try{
    const r = await fetch(`${API}?app=grafico&param=temp&rango=${rango}`);
    const d = await r.json();
    if (!d.labels || d.labels.length === 0){
      canvas.style.display='none';
      empty.hidden = false;
      return;
    }
    canvas.style.display='block';
    empty.hidden = true;

    if (chartTemp) chartTemp.destroy();
    chartTemp = new Chart(canvas.getContext('2d'), {
      type:'line',
      data:{
        labels:d.labels,
        datasets:[
          {label:'Sonda 1', data:d.serie1, borderColor:'#2F5233', backgroundColor:'rgba(47,82,51,0.08)', fill:true, tension:0.35, pointRadius:0, borderWidth:2.5},
          {label:'Ambiente', data:d.serie2, borderColor:'#2E6F95', fill:false, tension:0.35, pointRadius:0, borderWidth:2.5}
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          y:{ticks:{font:{size:10},color:'#5B6258'}, grid:{color:'rgba(32,40,31,0.05)'}},
          x:{ticks:{maxTicksLimit:6, font:{size:9}, color:'#5B6258'}, grid:{display:false}}
        }
      }
    });
  }catch(err){
    canvas.style.display='none';
    empty.hidden = false;
    empty.textContent = "No se pudo cargar el gráfico.";
  }
}

document.getElementById('chips').addEventListener('click', e=>{
  const btn = e.target.closest('.chip');
  if (!btn) return;
  cargarGrafico(btn.dataset.rango);
});

document.getElementById('chipsTemp').addEventListener('click', e=>{
  const btn = e.target.closest('.chip');
  if (!btn) return;
  cargarGraficoTemp(btn.dataset.rango);
});

document.getElementById('refreshBtn').addEventListener('click', ()=>{
  cargarEstado();
  cargarGrafico(rangoActual);
  cargarGraficoTemp(rangoTempActual);
});

cargarEstado();
cargarGrafico(rangoActual);
cargarGraficoTemp(rangoTempActual);
</script>
</body>
</html>
